<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>thfProject — Void Minecraft Server</title>
  <meta name="description" content="thfProject — A semi-anarchy void Minecraft server. No floor, random items every 30 seconds, Java &amp; Bedrock cross-play." />
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAA6ElEQVR4Xu2Qyw3CQBDF0gadUAcS7VAGolW4wGkPWElmE4Xvs6V38e5lPNzDGSjSMABFGgagSMMAFGkYgCINA1CkYQCKNAxAkYYBKNIwAEUaLwlwOB+fthX7y61rSzAAxRzX0+5pUxjAAO8JsAUGoBiDh3NkqwA8eOl6MADFGDyYI1WA6r3Bg5auBwNQzFEd3qgOrN6nWHNghQEo5lgbgCPVe8MABjDAbwao6P1vAAMY4LMByFSQ3oMavf8NYAADfFeAf8AAFGkYgCINA1CkYQCKNAxAkYYBKNIwAEUaBqBIwwAUacQHeACu6DHUTws7PwAAAABJRU5ErkJggg==" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #080808;
      --paper: #f0ece3;
      --ash: #111111;
      --smudge: #1c1c1c;
      --fog: #2a2a2a;
      --burn: #e04918;
      --grow: #4ade80;
      --sky: #38bdf8;
      --pale: rgba(240,236,227,0.55);
      --hairline: rgba(240,236,227,0.09);
      --rnd: 4px;
      --rndlg: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--ink);
      color: var(--paper);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button { cursor: pointer; font-family: inherit; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.35;
    }

    .mono { font-family: 'Space Mono', monospace; }

    .tag {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pale);
      margin-bottom: 0.9rem;
      border: 1px solid var(--hairline);
      padding: 0.25rem 0.6rem;
      border-radius: 2px;
    }

    .bighead {
      font-size: clamp(2.2rem, 5.5vw, 3.6rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.04em;
      margin-bottom: 1.1rem;
    }

    .bodytxt {
      font-size: 1rem;
      font-weight: 400;
      color: rgba(240,236,227,0.68);
      max-width: 580px;
      line-height: 1.8;
    }

    section { padding: 96px 0; }

    .wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 28px;
    }

    .wordmark {
      font-family: 'Press Start 2P', cursive;
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
    }
    .wordmark .p1 { color: var(--burn); }
    .wordmark .p2 { color: var(--grow); }
    .wordmark .p3 { color: var(--sky); }
    .wordmark .p4 { color: rgba(240,236,227,0.88); }

    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 0 28px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.3s, border-bottom 0.3s;
    }
    #topbar.stuck {
      background: rgba(8,8,8,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--hairline);
    }

    .topbar-logo { font-size: 1.2rem; }
    .topbar-logo .p4 { display: none; }

    .navlist {
      display: flex;
      align-items: center;
      gap: 2rem;
      list-style: none;
    }
    .navlist a {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--pale);
      transition: color 0.2s;
    }
    .navlist a:hover { color: var(--paper); }

    .disc-btn {
      background: #5865F2;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 0.48rem 1rem;
      border-radius: var(--rnd);
      border: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .disc-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    #burgerbtn {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: transparent;
      border: none;
      padding: 6px;
    }
    #burgerbtn span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--paper);
      border-radius: 1px;
      transition: transform 0.28s, opacity 0.28s;
    }
    #burgerbtn.popped span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    #burgerbtn.popped span:nth-child(2) { opacity: 0; }
    #burgerbtn.popped span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    #mobnav {
      display: none;
      position: fixed;
      top: 62px; left: 0; right: 0;
      background: rgba(8,8,8,0.97);
      backdrop-filter: blur(16px);
      padding: 1.4rem 28px 1.8rem;
      z-index: 999;
      border-bottom: 1px solid var(--hairline);
      flex-direction: column;
      gap: 1.1rem;
    }
    #mobnav.popped { display: flex; }
    #mobnav a {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--pale);
      padding: 0.35rem 0;
      transition: color 0.2s;
    }
    #mobnav a:hover { color: var(--paper); }
    #mobnav .disc-btn { width: fit-content; margin-top: 0.3rem; }

    @media (max-width: 767px) {
      .navlist { display: none; }
      #burgerbtn { display: flex; }
    }
  </style>
</head>
<body>
</body>
</html>
